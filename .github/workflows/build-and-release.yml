name: Build and Package Game (PWA, Android APK, Windows EXE)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggers from GitHub Actions UI

jobs:
  # ----------------------------------------------------
  # JOB 1: BUILD WEB PWA APPLICATION
  # ----------------------------------------------------
  build-web-pwa:
    name: 🌐 Build PWA & Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Upload Web PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa-build
          path: dist/
          retention-days: 7

  # ----------------------------------------------------
  # JOB 2: BUILD ANDROID APK
  # ----------------------------------------------------
  build-android-apk:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: build-web-pwa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Initialize and Sync Capacitor Android Project
        run: |
          # Install Capacitor dependencies dynamically
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Initialize capacitor config
          npx cap init "Glide Gunner" "com.glidegunner.app" --web-dir=dist --noprompt
          
          # Add the Android platform template
          npx cap add android
          
          # Sync Web assets into native Android project
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Unsigned Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ----------------------------------------------------
  # JOB 3: BUILD WINDOWS EXE EXECUTABLE
  # ----------------------------------------------------
  build-windows-exe:
    name: 💻 Build Windows EXE
    runs-on: ubuntu-latest
    needs: build-web-pwa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Create Electron Wrapper files dynamically
        run: |
          # Create a custom entry point for Electron wrapper
          cat << 'EOF' > electron-main.js
          const { app, BrowserWindow } = require('electron');
          const path = require('path');

          function createWindow() {
            const win = new BrowserWindow({
              width: 500,
              height: 850,
              resizable: true,
              autoHideMenuBar: true,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true
              }
            });

            // Load local compiled production index.html
            win.loadFile(path.join(__dirname, 'dist/index.html'));
          }

          app.whenReady().then(() => {
            createWindow();

            app.on('activate', () => {
              if (BrowserWindow.getAllWindows().length === 0) createWindow();
            });
          });

          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') app.quit();
          });
          EOF

          # Create a minimal electron builder package config
          cat << 'EOF' > electron-builder.json
          {
            "appId": "com.glidegunner.app",
            "productName": "Glide Gunner",
            "directories": {
              "output": "dist-desktop"
            },
            "files": [
              "dist/**/*",
              "electron-main.js"
            ],
            "win": {
              "target": "portable",
              "icon": "public/manifest.json"
            }
          }
          EOF

      - name: Package Windows Portable EXE
        run: |
          # Install electron and electron-builder dynamically
          npm install electron electron-builder --save-dev
          
          # Modify package.json temporarily to declare "main": "electron-main.js"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.main = 'electron-main.js';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          # Run Electron Builder to compile portable EXE
          npx electron-builder --win --x64

      - name: Upload Windows Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-exe
          path: dist-desktop/*.exe
          retention-days: 7
